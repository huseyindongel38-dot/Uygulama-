<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ders Notlarım" />
  <link rel="manifest" href="manifest.json" />
  <title>Ders Notlarım</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #F8F9FB; font-family: 'Segoe UI', system-ui, sans-serif; }
    #root { height: 100vh; width: 100vw; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
    @keyframes fadeIn { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }
    input, textarea, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── Sabitler ──────────────────────────────────────────────────
    const COLORS = [
      { color:"#F59E0B", light:"#FEF3C7" },
      { color:"#3B82F6", light:"#DBEAFE" },
      { color:"#10B981", light:"#D1FAE5" },
      { color:"#84CC16", light:"#ECFCCB" },
      { color:"#EF4444", light:"#FEE2E2" },
      { color:"#8B5CF6", light:"#EDE9FE" },
      { color:"#6B7280", light:"#F3F4F6" },
      { color:"#EC4899", light:"#FCE7F3" },
    ];
    const EMOJIS = ["📐","⚡","🧪","🌿","📜","📖","📝","🎨","🔬","🌍","💻","🎵"];

    const DEFAULT_FOLDERS = [
      { id:"matematik", label:"Matematik", emoji:"📐", color:"#F59E0B", light:"#FEF3C7" },
      { id:"fizik",     label:"Fizik",     emoji:"⚡", color:"#3B82F6", light:"#DBEAFE" },
      { id:"kimya",     label:"Kimya",     emoji:"🧪", color:"#10B981", light:"#D1FAE5" },
    ];
    const INITIAL_NOTES = [
      { id:1, title:"Newton'un Hareket Yasaları", content:"F = ma formülü, kuvvet ile ivme arasındaki ilişkiyi gösterir.\n\nBirinci yasa: Durağanlık ilkesi.\nİkinci yasa: F=ma.\nÜçüncü yasa: Etki-tepki.", subject:"fizik", images:[], date:"2026-05-20" },
      { id:2, title:"Türev Kuralları", content:"Temel türev kuralları:\n• Sabit: (c)' = 0\n• Kuvvet: (xⁿ)' = n·xⁿ⁻¹\n• Toplam: (f+g)' = f' + g'\n• Çarpım: (f·g)' = f'g + fg'", subject:"matematik", images:[], date:"2026-05-22" },
    ];

    // LocalStorage yardımcıları
    const load = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } };
    const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

    // ── Stil yardımcıları ─────────────────────────────────────────
    const wb = (bg, color) => ({ padding:"8px 14px", borderRadius:8, border:"none", background:bg, color, cursor:"pointer", fontSize:13, fontWeight:600 });
    const ip = { width:"100%", padding:"10px 13px", borderRadius:9, border:"1.5px solid #E5E7EB", background:"#F9FAFB", color:"#111827", fontSize:14, outline:"none", marginBottom:14, boxSizing:"border-box" };
    const lb = { display:"block", fontSize:11, color:"#6B7280", fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginBottom:5 };

    // ── Klasör Modal ──────────────────────────────────────────────
    function FolderModal({ folder, onSave, onCancel }) {
      const [label, setLabel]     = useState(folder?.label ?? "");
      const [emoji, setEmoji]     = useState(folder?.emoji ?? "📝");
      const [colorIdx, setColorIdx] = useState(folder ? Math.max(0, COLORS.findIndex(c=>c.color===folder.color)) : 6);

      const save = () => {
        if (!label.trim()) return;
        const id = folder?.id ?? ("folder_" + Date.now());
        onSave({ id, label:label.trim(), emoji, color:COLORS[colorIdx].color, light:COLORS[colorIdx].light });
      };

      return (
        <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:360,padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}>
            <h3 style={{margin:"0 0 18px",fontSize:17,fontWeight:800,color:"#111827"}}>{folder ? "✏️ Klasörü Düzenle" : "📁 Yeni Klasör"}</h3>
            <label style={lb}>Klasör Adı *</label>
            <input placeholder="örn: İngilizce, Coğrafya..." value={label} onChange={e=>setLabel(e.target.value)}
              style={ip} autoFocus onKeyDown={e=>e.key==="Enter"&&save()} />
            <label style={lb}>Emoji</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {EMOJIS.map(em=>(
                <button key={em} onClick={()=>setEmoji(em)} style={{fontSize:20,width:38,height:38,borderRadius:9,border:`2px solid ${emoji===em?"#4F46E5":"#E5E7EB"}`,background:emoji===em?"#EEF2FF":"#F9FAFB",cursor:"pointer"}}>
                  {em}
                </button>
              ))}
            </div>
            <label style={lb}>Renk</label>
            <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
              {COLORS.map((c,i)=>(
                <button key={i} onClick={()=>setColorIdx(i)} style={{width:30,height:30,borderRadius:"50%",background:c.color,border:`3px solid ${colorIdx===i?"#111827":"transparent"}`,cursor:"pointer"}} />
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={save} style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:"#4F46E5",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                {folder ? "Kaydet" : "Oluştur"}
              </button>
              <button onClick={onCancel} style={wb("#F3F4F6","#374151")}>İptal</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Sidebar Item ──────────────────────────────────────────────
    function SidebarItem({ active, onClick, onEdit, onDelete, emoji, label, count, color, isCustom }) {
      const [hover, setHover] = useState(false);
      return (
        <div style={{position:"relative"}} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
          <button onClick={onClick} style={{
            width:"100%", display:"flex", alignItems:"center", gap:10,
            padding:"9px 10px", borderRadius:9, border:"none",
            background: active ? color+"18" : "transparent",
            color: active ? color : "#374151",
            cursor:"pointer", fontWeight: active ? 700 : 500,
            fontSize:14, transition:"all .15s", marginBottom:2, textAlign:"left",
          }}>
            <span style={{fontSize:17,width:24,textAlign:"center"}}>{emoji}</span>
            <span style={{flex:1}}>{label}</span>
            {count > 0 && (
              <span style={{background:active?color:"#F3F4F6",color:active?"#fff":"#6B7280",borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:700}}>
                {count}
              </span>
            )}
          </button>
          {isCustom && hover && (
            <div style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",display:"flex",gap:2,zIndex:10}}>
              <button onClick={e=>{e.stopPropagation();onEdit();}} style={{background:"#EEF2FF",border:"none",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:11,color:"#4F46E5"}}>✏️</button>
              <button onClick={e=>{e.stopPropagation();onDelete();}} style={{background:"#FEE2E2",border:"none",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontSize:11,color:"#EF4444"}}>🗑</button>
            </div>
          )}
        </div>
      );
    }

    // ── Not Kartı ─────────────────────────────────────────────────
    function NoteCard({ note, subject, onClick, onDelete }) {
      const hasImg = note.images && note.images.length > 0;
      return (
        <div onClick={onClick} style={{background:"#fff",border:"1.5px solid #E5E7EB",borderRadius:14,cursor:"pointer",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",transition:"all .2s"}}>
          {hasImg && (
            <div style={{height:120,overflow:"hidden",position:"relative"}}>
              <img src={note.images[0].src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
              {note.images.length > 1 && (
                <div style={{position:"absolute",bottom:6,right:8,background:"rgba(0,0,0,.5)",color:"#fff",borderRadius:8,padding:"2px 8px",fontSize:11}}>+{note.images.length-1}</div>
              )}
            </div>
          )}
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:subject.color,fontWeight:700,background:subject.light,padding:"2px 8px",borderRadius:6}}>
                {subject.emoji} {subject.label}
              </span>
              <button onClick={e=>{e.stopPropagation();onDelete();}} style={{background:"none",border:"none",color:"#D1D5DB",cursor:"pointer",fontSize:18,lineHeight:1,padding:0}}>×</button>
            </div>
            <h3 style={{margin:"0 0 5px",fontSize:15,fontWeight:700,color:"#111827",lineHeight:1.3}}>{note.title}</h3>
            <p style={{margin:0,fontSize:13,color:"#6B7280",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{note.content}</p>
            <div style={{display:"flex",gap:6,marginTop:10,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#9CA3AF"}}>{note.date}</span>
              {hasImg && <span style={{fontSize:11,color:"#9CA3AF"}}>🖼 {note.images.length}</span>}
            </div>
          </div>
        </div>
      );
    }

    // ── Not Detay Modal (Tam Ekran) ───────────────────────────────
    function NoteModal({ note, subject, folders, onClose, onDelete, onSave, onAddImage, onRemoveImage, editFileRef }) {
      const [lightbox, setLightbox] = useState(null);
      const [editing, setEditing]   = useState(false);
      const [editData, setEditData] = useState({ title:note.title, content:note.content, subject:note.subject });

      const handleSave  = () => { onSave(editData); setEditing(false); };
      const cancelEdit  = () => { setEditing(false); setEditData({ title:note.title, content:note.content, subject:note.subject }); };

      return (
        <div style={{position:"fixed",inset:0,zIndex:500,background:"#fff",display:"flex",flexDirection:"column",animation:"fadeIn .2s ease"}}>
          {lightbox !== null && (
            <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <img src={note.images[lightbox].src} alt="" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:12}} />
              <button onClick={()=>setLightbox(null)} style={{position:"fixed",top:18,right:22,background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",fontSize:20,borderRadius:8,padding:"4px 12px",cursor:"pointer"}}>✕</button>
            </div>
          )}
          <div style={{background:"#fff",width:"100%",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid #F3F4F6",flexShrink:0,flexWrap:"wrap",gap:8}}>
              <span style={{background:subject.light,color:subject.color,padding:"5px 13px",borderRadius:8,fontWeight:700,fontSize:13}}>
                {subject.emoji} {subject.label}
              </span>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {!editing
                  ? <button onClick={()=>setEditing(true)} style={wb("#EEF2FF","#4F46E5")}>✏️ Düzenle</button>
                  : <>
                      <button onClick={handleSave}  style={wb("#D1FAE5","#059669")}>💾 Kaydet</button>
                      <button onClick={cancelEdit}  style={wb("#F3F4F6","#374151")}>İptal</button>
                    </>
                }
                <button onClick={onDelete} style={wb("#FEE2E2","#EF4444")}>🗑 Sil</button>
                <button onClick={onClose}  style={wb("#F3F4F6","#374151")}>✕ Kapat</button>
              </div>
            </div>
            <div style={{overflowY:"auto",padding:"24px 20px",flex:1}}>
              {editing ? (
                <>
                  <label style={lb}>Klasör</label>
                  <select value={editData.subject} onChange={e=>setEditData(p=>({...p,subject:e.target.value}))} style={ip}>
                    {folders.map(s=><option key={s.id} value={s.id}>{s.emoji} {s.label}</option>)}
                  </select>
                  <label style={lb}>Başlık</label>
                  <input value={editData.title} onChange={e=>setEditData(p=>({...p,title:e.target.value}))} style={ip} />
                  <label style={lb}>İçerik</label>
                  <textarea value={editData.content} onChange={e=>setEditData(p=>({...p,content:e.target.value}))}
                    rows={12} style={{...ip,resize:"vertical",lineHeight:1.7}} />
                </>
              ) : (
                <>
                  <h2 style={{margin:"0 0 4px",fontSize:24,fontWeight:800,color:"#111827"}}>{note.title}</h2>
                  <p style={{fontSize:12,color:"#9CA3AF",marginBottom:22}}>{note.date}</p>
                </>
              )}

              {note.images && note.images.length > 0 && (
                <div style={{marginBottom:22}}>
                  <p style={{fontSize:11,color:"#9CA3AF",marginBottom:10,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>Görseller ({note.images.length})</p>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
                    {note.images.map((img,i)=>(
                      <div key={i} style={{position:"relative",borderRadius:12,overflow:"hidden",border:"1px solid #E5E7EB"}}>
                        <img src={img.src} alt={img.name} onClick={()=>setLightbox(i)} style={{width:"100%",height:110,objectFit:"cover",cursor:"zoom-in",display:"block"}} />
                        <button onClick={()=>onRemoveImage(i)} style={{position:"absolute",top:5,right:5,background:"rgba(0,0,0,.55)",color:"#fff",border:"none",borderRadius:"50%",width:24,height:24,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <button onClick={()=>editFileRef.current?.click()} style={{...wb("#EEF2FF","#4F46E5"),marginBottom:22,fontSize:13}}>
                📁 Görsel Yükle
              </button>
              <input ref={editFileRef} type="file" accept="image/*" multiple hidden onChange={e=>onAddImage(e.target.files)} />

              {!editing && (
                <div style={{background:"#F9FAFB",borderRadius:14,padding:"18px 20px",lineHeight:1.9,fontSize:16,color:"#374151",whiteSpace:"pre-wrap",border:"1px solid #E5E7EB"}}>
                  {note.content}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Yeni Not Modal (Tam Ekran) ────────────────────────────────
    function CreateModal({ form, setForm, onSave, onCancel, handleImageUpload, removeImage, dragOver, setDragOver, handleDrop, fileRef, folders }) {
      return (
        <div style={{position:"fixed",inset:0,zIndex:500,background:"#fff",display:"flex",flexDirection:"column",animation:"fadeIn .2s ease"}}>
          <div style={{background:"#fff",width:"100%",flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid #F3F4F6",flexShrink:0}}>
              <h3 style={{margin:0,fontSize:18,fontWeight:800,color:"#111827"}}>✏️ Yeni Not</h3>
              <button onClick={onCancel} style={wb("#F3F4F6","#374151")}>✕</button>
            </div>
            <div style={{overflowY:"auto",padding:"20px",flex:1}}>
              <label style={lb}>Klasör</label>
              <select value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))} style={ip}>
                {folders.map(s=><option key={s.id} value={s.id}>{s.emoji} {s.label}</option>)}
              </select>
              <label style={lb}>Başlık *</label>
              <input placeholder="Not başlığı..." value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} style={ip} />
              <label style={lb}>İçerik</label>
              <textarea placeholder="Ders notlarını buraya yaz..." value={form.content}
                onChange={e=>setForm(p=>({...p,content:e.target.value}))} rows={7}
                style={{...ip,resize:"vertical",lineHeight:1.7}} />
              <label style={lb}>Görseller</label>
              <div
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={handleDrop}
                onClick={()=>fileRef.current?.click()}
                style={{border:`2px dashed ${dragOver?"#4F46E5":"#D1D5DB"}`,borderRadius:12,padding:"20px 16px",textAlign:"center",cursor:"pointer",background:dragOver?"#EEF2FF":"#F9FAFB",transition:"all .2s",marginBottom:14,color:"#9CA3AF",fontSize:14}}
              >
                📁 Görsel seç veya sürükle & bırak
                <input ref={fileRef} type="file" accept="image/*" multiple hidden onChange={e=>handleImageUpload(e.target.files)} />
              </div>
              {form.images.length > 0 && (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(90px,1fr))",gap:8,marginBottom:16}}>
                  {form.images.map((img,i)=>(
                    <div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid #E5E7EB"}}>
                      <img src={img.src} alt="" style={{width:"100%",height:80,objectFit:"cover"}} />
                      <button onClick={()=>removeImage(i)} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,.55)",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,lineHeight:1}}>×</button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{display:"flex",gap:10,marginTop:8}}>
                <button onClick={onSave} style={{flex:1,padding:"12px 0",borderRadius:10,border:"none",background:"#4F46E5",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
                  💾 Kaydet
                </button>
                <button onClick={onCancel} style={wb("#F3F4F6","#374151")}>İptal</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Ana Uygulama ──────────────────────────────────────────────
    function App() {
      const [folders, setFolders]         = useState(() => load("dn_folders", DEFAULT_FOLDERS));
      const [notes, setNotes]             = useState(() => load("dn_notes", INITIAL_NOTES));
      const [activeSubject, setActive]    = useState("tumu");
      const [searchQuery, setSearch]      = useState("");
      const [selectedNote, setSelected]   = useState(null);
      const [isCreating, setIsCreating]   = useState(false);
      const [sidebarOpen, setSidebar]     = useState(false); // mobilde kapalı başla
      const [form, setForm]               = useState({title:"",content:"",subject:"",images:[]});
      const [dragOver, setDragOver]       = useState(false);
      const [folderModal, setFolderModal] = useState(null);
      const fileRef     = useRef();
      const editFileRef = useRef();

      // Değişince localStorage'a kaydet
      useEffect(() => { save("dn_folders", folders); }, [folders]);
      useEffect(() => { save("dn_notes",   notes);   }, [notes]);

      const getSubject = id => folders.find(s=>s.id===id) || { id:"?", label:"Diğer", emoji:"📝", color:"#6B7280", light:"#F3F4F6" };

      const filteredNotes = notes.filter(n => {
        const match = activeSubject==="tumu" || n.subject===activeSubject;
        const q = searchQuery.toLowerCase();
        return match && (!q || n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q));
      });

      const handleImageUpload = (files, isEdit=false) => {
        Array.from(files).forEach(file => {
          if (!file.type.startsWith("image/")) return;
          const reader = new FileReader();
          reader.onload = e => {
            if (isEdit && selectedNote) {
              const updated = {...selectedNote, images:[...(selectedNote.images||[]),{src:e.target.result,name:file.name}]};
              setSelected(updated);
              setNotes(prev=>prev.map(n=>n.id===selectedNote.id?updated:n));
            } else {
              setForm(prev=>({...prev,images:[...prev.images,{src:e.target.result,name:file.name}]}));
            }
          };
          reader.readAsDataURL(file);
        });
      };

      const handleDrop = e => { e.preventDefault(); setDragOver(false); handleImageUpload(e.dataTransfer.files); };

      const saveNote = () => {
        if (!form.title.trim()) return;
        const subjectId = form.subject || folders[0]?.id || "diger";
        setNotes(prev=>[{ id:Date.now(), title:form.title, content:form.content, subject:subjectId, images:form.images, date:new Date().toISOString().split("T")[0] },...prev]);
        setForm({title:"",content:"",subject:"",images:[]});
        setIsCreating(false);
      };

      const deleteNote = id => {
        setNotes(prev=>prev.filter(n=>n.id!==id));
        if (selectedNote?.id===id) setSelected(null);
      };

      const updateNote = editData => {
        const updated = {...selectedNote,...editData};
        setSelected(updated);
        setNotes(prev=>prev.map(n=>n.id===selectedNote.id?updated:n));
      };

      const removeImage = (idx, isEdit=false) => {
        if (isEdit && selectedNote) {
          const updated = {...selectedNote, images:selectedNote.images.filter((_,i)=>i!==idx)};
          setSelected(updated);
          setNotes(prev=>prev.map(n=>n.id===selectedNote.id?updated:n));
        } else {
          setForm(prev=>({...prev,images:prev.images.filter((_,i)=>i!==idx)}));
        }
      };

      const saveFolder = folder => {
        if (folderModal==="new") setFolders(prev=>[...prev,folder]);
        else setFolders(prev=>prev.map(f=>f.id===folder.id?folder:f));
        setFolderModal(null);
      };

      const deleteFolder = id => {
        setFolders(prev=>prev.filter(f=>f.id!==id));
        if (activeSubject===id) setActive("tumu");
      };

      const openCreate = () => {
        setForm({title:"",content:"",subject:folders[0]?.id??"",images:[]});
        setIsCreating(true);
        setSidebar(false);
      };

      return (
        <div style={{display:"flex",height:"100vh",background:"#F8F9FB",overflow:"hidden"}}>

          {/* Overlay (mobilde sidebar açıkken) */}
          {sidebarOpen && (
            <div onClick={()=>setSidebar(false)}
              style={{position:"fixed",inset:0,zIndex:80,background:"rgba(0,0,0,0.3)"}} />
          )}

          {folderModal && <FolderModal folder={folderModal==="new"?null:folderModal} onSave={saveFolder} onCancel={()=>setFolderModal(null)} />}

          {selectedNote && (
            <NoteModal note={selectedNote} subject={getSubject(selectedNote.subject)} folders={folders}
              onClose={()=>setSelected(null)} onDelete={()=>deleteNote(selectedNote.id)}
              onSave={updateNote}
              onAddImage={files=>handleImageUpload(files,true)} onRemoveImage={i=>removeImage(i,true)}
              editFileRef={editFileRef} />
          )}

          {isCreating && (
            <CreateModal form={form} setForm={setForm} onSave={saveNote} onCancel={()=>setIsCreating(false)}
              handleImageUpload={handleImageUpload} removeImage={removeImage}
              dragOver={dragOver} setDragOver={setDragOver} handleDrop={handleDrop} fileRef={fileRef}
              folders={folders} />
          )}

          {/* SIDEBAR */}
          <aside style={{
            position:"fixed", top:0, left:0, height:"100%", zIndex:90,
            width:250,
            transform: sidebarOpen ? "translateX(0)" : "translateX(-100%)",
            background:"#fff", borderRight:"1px solid #E5E7EB",
            display:"flex", flexDirection:"column",
            transition:"transform .28s ease",
            boxShadow: sidebarOpen ? "4px 0 20px rgba(0,0,0,0.12)" : "none",
          }}>
            <div style={{padding:"22px 18px 14px",borderBottom:"1px solid #F3F4F6"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:26}}>📚</span>
                <div>
                  <div style={{fontWeight:800,fontSize:16,color:"#111827"}}>Ders Notlarım</div>
                  <div style={{fontSize:11,color:"#9CA3AF",marginTop:1}}>{notes.length} not</div>
                </div>
              </div>
            </div>
            <div style={{padding:"12px 14px 8px"}}>
              <button onClick={openCreate} style={{width:"100%",padding:"10px 0",borderRadius:10,background:"#4F46E5",color:"#fff",border:"none",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                + Yeni Not
              </button>
            </div>
            <div style={{padding:"4px 10px",overflowY:"auto",flex:1}}>
              <SidebarItem active={activeSubject==="tumu"} onClick={()=>{setActive("tumu");setSidebar(false);}}
                emoji="🗂️" label="Tümü" count={notes.length} color="#4F46E5" />
              <div style={{padding:"12px 8px 4px",fontSize:10,fontWeight:700,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:1.2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>Klasörler</span>
                <button onClick={()=>setFolderModal("new")} style={{background:"none",border:"none",color:"#9CA3AF",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 2px"}}>+</button>
              </div>
              {folders.map(s=>(
                <SidebarItem key={s.id} active={activeSubject===s.id}
                  onClick={()=>{setActive(s.id);setSidebar(false);}}
                  emoji={s.emoji} label={s.label}
                  count={notes.filter(n=>n.subject===s.id).length} color={s.color}
                  isCustom={true}
                  onEdit={()=>setFolderModal(s)}
                  onDelete={()=>deleteFolder(s.id)} />
              ))}
            </div>
            <div style={{padding:"10px 14px",borderTop:"1px solid #F3F4F6"}}>
              <button onClick={()=>setFolderModal("new")} style={{width:"100%",padding:"8px 0",borderRadius:9,border:"1.5px dashed #D1D5DB",background:"transparent",color:"#6B7280",fontWeight:600,fontSize:13,cursor:"pointer"}}>
                + Klasör Ekle
              </button>
            </div>
          </aside>

          {/* MAIN */}
          <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
            <header style={{background:"#fff",borderBottom:"1px solid #E5E7EB",padding:"0 16px",height:58,display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
              <button onClick={()=>setSidebar(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",padding:"5px 3px",borderRadius:8,display:"flex",flexDirection:"column",gap:5,alignItems:"flex-start",flexShrink:0}}>
                <span style={{display:"block",width:22,height:2.5,background:"#374151",borderRadius:2}} />
                <span style={{display:"block",width:14,height:2.5,background:"#374151",borderRadius:2}} />
                <span style={{display:"block",width:22,height:2.5,background:"#374151",borderRadius:2}} />
              </button>
              <div style={{fontWeight:700,fontSize:15,color:"#111827",flexShrink:0}}>
                {activeSubject==="tumu" ? "Tüm Notlar" : (()=>{const s=getSubject(activeSubject);return `${s.emoji} ${s.label}`;})()}
              </div>
              <div style={{flex:1,position:"relative"}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#9CA3AF"}}>🔍</span>
                <input placeholder="Not ara..." value={searchQuery} onChange={e=>setSearch(e.target.value)}
                  style={{width:"100%",padding:"8px 10px 8px 30px",borderRadius:10,border:"1.5px solid #E5E7EB",background:"#F9FAFB",color:"#111827",fontSize:14,outline:"none"}} />
              </div>
            </header>

            <div style={{flex:1,overflowY:"auto",padding:16}}>
              {filteredNotes.length===0 ? (
                <div style={{textAlign:"center",marginTop:80,color:"#9CA3AF"}}>
                  <div style={{fontSize:52}}>📭</div>
                  <p style={{fontSize:17,marginTop:12,color:"#6B7280",fontWeight:600}}>Henüz not yok</p>
                  <p style={{fontSize:14}}>☰ menüden klasör seç veya + ile not ekle</p>
                </div>
              ) : (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
                  {filteredNotes.map(note=>(
                    <NoteCard key={note.id} note={note}
                      subject={getSubject(note.subject)}
                      onClick={()=>setSelected(note)}
                      onDelete={()=>deleteNote(note.id)} />
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Service Worker kayıt
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
